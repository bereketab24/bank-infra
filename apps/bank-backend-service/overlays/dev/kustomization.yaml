apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: dev
images:
- name: bereketab24/bank-bff
  newName: bereketab24/bank-bff
  newTag: 9c75cd5

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: bank-backend-service
    spec:
      replicas: 1
      template:
        spec:
          containers:
            - name: bank-bff
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
              env:
                - name: SPRING_PROFILES_ACTIVE
                  value: dev
  target:
    kind: Deployment
    name: bank-backend-service
