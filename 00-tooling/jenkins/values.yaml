controller:
  serviceType: NodePort
  servicePort: 8080
  nodePort: 32000
  admin:
    password: "admin" #Proper secret handling to be implemented
  image:
    registry: docker.io
    repository: jenkins/jenkins
    tag: 2.552
  probes:
    startupProbe:
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 15
      failureThreshold: 30
  csrf:
    defaultCrumbIssuer:
      enabled: false
  resources:
    limits:
      cpu: 600m
      memory: 1200Mi
    requests:
      cpu: 300m
      memory: 768Mi
  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - github:latest
    - github-branch-source:latest
    - pipeline-stage-view:latest
    - docker-workflow:latest
    - gradle:latest
    - configuration-as-code:latest
#If you are having an issue with permission and volume mounting, SSH manually in the Minikube to create the volume. Use the following command:

# minikube -p bank-cluster ssh
# sudo chown -R 1000:1000 /data/jenkins-volume
# exit
persistence:
  enabled: true
  storageClass: jenkins-pv
  size: 3Gi
serviceAccount:
  create: false
  name: jenkins
