grafana:
  enabled: true
  adminPassword: admin  # Change in secrets for prod
prometheus:
  server:
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
alertmanager:
  enabled: false  # Enable later for alerts
kube-state-metrics:
  enabled: true
#disabling the TLS requirement between K8s API server and Prometheus Operator
prometheusOperator:
  admissionWebhooks:
    enabled: false